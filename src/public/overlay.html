<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Player Controls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 40px;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .header {
      display: flex;
      align-items: center;
      height: 40px;
      position: relative;
    }
    /*
     * Drag region sits BEHIND everything else as an absolute overlay.
     * It covers the full bar EXCEPT the rightmost 130px (where the button lives).
     * This avoids -webkit-app-region: drag eating click events on the button.
     */
    .drag-region {
      position: absolute;
      inset: 0;
      right: 130px;
      -webkit-app-region: drag;
      z-index: 0;
    }
    .title {
      position: relative;
      z-index: 1;
      pointer-events: none;
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 1rem;
      flex: 1;
    }
    .close-btn {
      /* Must NOT be inside a -webkit-app-region: drag area */
      -webkit-app-region: no-drag;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      width: 110px;
      margin-right: 10px;
      background: rgba(239, 68, 68, 0.85);
      border: none;
      color: #fff;
      padding: 6px 0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      /* Force hit-testing to this element */
      pointer-events: all;
    }
    .close-btn:hover  { background: rgb(239, 68, 68); }
    .close-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="header">
    <div class="drag-region"></div>
    <span class="title" id="title">Video Player</span>
    <button class="close-btn" id="close-btn">✕ Close Video</button>
  </div>
  <script>
    // Show decoded title
    const params = new URLSearchParams(window.location.search);
    const titleEl = document.getElementById('title');
    if (titleEl) titleEl.textContent = params.get('title') || 'Video Player';

    // Close button — invoke Tauri command
    document.getElementById('close-btn').addEventListener('click', async () => {
      try {
        if (window.__TAURI_INTERNALS__ && typeof window.__TAURI_INTERNALS__.invoke === 'function') {
          await window.__TAURI_INTERNALS__.invoke('close_video_player');
        } else {
          // Fallback: emit a custom event that the main window can relay
          console.error('[flud overlay] __TAURI_INTERNALS__ not available — is this running inside Tauri?');
        }
      } catch (e) {
        console.error('[flud overlay] close_video_player failed:', e);
      }
    });
  </script>
</body>
</html>
